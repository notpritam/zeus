<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeus</title>
</head>
<body>
  <div id="root"></div>
  <div id="loading-indicator" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a0a;color:#888;font-family:system-ui;font-size:14px;z-index:99999">Loading Zeus...</div>
  <script>
    window.addEventListener('error', function(e) {
      // Skip benign Monaco/ResizeObserver errors
      var msg = e.message || '';
      if (msg === 'Canceled' || msg.indexOf('ResizeObserver') !== -1) return;
      document.getElementById('loading-indicator').innerHTML =
        '<div style="padding:20px;color:#ef4444;max-width:90vw;word-break:break-word">' +
        '<b>JS Error:</b><br>' + e.message + '<br><br><small>' + (e.filename || '') + ':' + (e.lineno || '') + '</small></div>';
      document.getElementById('loading-indicator').style.display = 'flex';
    });
    window.addEventListener('unhandledrejection', function(e) {
      // Skip benign Monaco editor "Canceled" errors and ResizeObserver errors
      var msg = e.reason?.message || String(e.reason || '');
      if (msg === 'Canceled' || msg.indexOf('ResizeObserver') !== -1) return;
      document.getElementById('loading-indicator').innerHTML =
        '<div style="padding:20px;color:#ef4444;max-width:90vw;word-break:break-word">' +
        '<b>Promise Error:</b><br>' + (e.reason?.message || e.reason || 'Unknown') + '</div>';
      document.getElementById('loading-indicator').style.display = 'flex';
    });
  </script>
  <script type="module" src="./src/main.tsx"></script>
  <script type="module">
    // Hide loading indicator once React mounts
    const obs = new MutationObserver(function() {
      if (document.getElementById('root')?.children.length) {
        document.getElementById('loading-indicator').style.display = 'none';
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'), { childList: true });
  </script>
</body>
</html>
